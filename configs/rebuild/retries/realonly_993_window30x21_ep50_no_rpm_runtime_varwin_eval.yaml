project: re-rebuild-viscnet
entity: jongwonsohn-seoul-national-university
name: realonly_993_window30x21_ep50_no_rpm_runtime_varwin_eval
version: v0
train_settings:
  num_workers: 0
  seed: 1205
  classification: true
  gmm_bool: false
  watch_bool: false
  train_bool: false
  test_bool: true
  attn_bool: false
  val_test_bool: false
  sanity_check_bool: false
dataset:
  train:
    train_root: outputs/rebuild_reproduction/derived_datasets/real_train_993_windows30_stride1
    use_all_samples: true
    frame_num: 6
    time: 5
    rpm_class: 10
    dataloader:
      dataloader: VideoDatasetReal
      batch_size: 16
      aug_bool: false
      test_size: 1.0e-06
      random_state: 37
    manifest: outputs/rebuild_reproduction/derived_datasets/real_train_993_windows30_stride1/manifest.json
  test:
    test_root: dataset/RealArchive/test_1000_wo_pat2
    frame_num: 6
    time: 5
    rpm_class: 10
    dataloader:
      dataloader: VideoDatasetReal
      batch_size: 16
      aug_bool: false
      test_size: 1.0e-06
      random_state: 37
  preprocess:
    scaler: interscaler
    descaler: interdescaler
model:
  transformer_bool: true
  transformer:
    encoder: VivitEmbed
    class: 10
    num_frames: 30
  embeddings:
    rpm_bool: false
    pat_bool: false
  cnn:
    encoder: Resnet34LSTMEMBED
    cnn_train: true
    cnn: resnet34
    lstm_size: 256
    lstm_layers: 5
    output_size: 3
    drop_rate: 0.0
    embedding_size: 512
    embed_weight: 0.0
  gmm:
    gmm_num: 3
training:
  curr_bool: true
  curr_ckpt: repro_realonly_993_window30x21_ep50.pth
  checkpoint_name: realonly_993_window30x21_ep50_no_rpm_runtime_varwin_eval.pth
  num_epochs: 1
  loss: CE
  label_smoothing: 0.0
  optimizer:
    optim_class: AdamW
    scheduler_class: CosineAnnealingLR
    schedule_policy: cosine
    warmup_epochs: 0
    warmup_start_factor: 1.0
    lr_hold_epochs: 0
    lr: 1.0e-05
    eta_min: 1.0e-07
    weight_decay: 0.01
    patience: 1
  acceptance:
    diagnostic: realonly_window30_checkpoint_no_rpm_runtime_variable_window
    source_checkpoint: repro_realonly_993_window30x21_ep50.pth
    note: This diagnostic uses the existing real-only 30-frame checkpoint, but evaluates it with model.embeddings.rpm_bool false and runtime RPM tensors forced to zero. The source checkpoint itself was trained with RPM conditioning; no real-only 30-frame no-RPM-trained checkpoint exists in this checkout.
misc_dir:
  ckpt_root: outputs/rebuild_reproduction/checkpoints
  output_root: outputs/rebuild_reproduction/realonly_993_window30x21_ep50_no_rpm_runtime_varwin_eval
  video_subdir: videos
  para_subdir: parameters
  norm_subdir: parametersNorm
