project: viscnet-rebuild
entity: jongwonsohn-seoul-national-university
name: repro_transfer_993_microbatch_lrhold_ep70_min87
version: v0
train_settings:
  num_workers: 0
  seed: 1205
  classification: true
  gmm_bool: false
  watch_bool: false
  train_bool: true
  test_bool: true
  attn_bool: false
  val_test_bool: true
  sanity_check_bool: false
dataset:
  train:
    train_root: dataset/RealArchive/train_993_wo_pat2
    frame_num: 10
    time: 5
    rpm_class: 10
    dataloader:
      dataloader: VideoDatasetReal
      batch_size: 10
      aug_bool: false
      test_size: 1.0e-06
      random_state: 37
    manifest: configs/rebuild/manifests/real_train_993.json
  test:
    test_root: dataset/RealArchive/test_1000_wo_pat2
    frame_num: 10
    time: 5
    rpm_class: 10
    dataloader:
      dataloader: VideoDatasetReal
      batch_size: 10
      aug_bool: false
      test_size: 1.0e-06
      random_state: 37
  preprocess:
    scaler: interscaler
    descaler: interdescaler
model:
  transformer_bool: true
  transformer:
    encoder: VivitEmbed
    class: 10
  embeddings:
    rpm_bool: true
    pat_bool: false
  cnn:
    encoder: Resnet34LSTMEMBED
    cnn_train: true
    cnn: resnet34
    lstm_size: 256
    lstm_layers: 5
    output_size: 3
    drop_rate: 0.0
    embedding_size: 512
    embed_weight: 0.0
  gmm:
    gmm_num: 3
training:
  curr_bool: true
  curr_ckpt: repro_synthetic_pretrain_sph35000.pth
  checkpoint_name: repro_transfer_993_microbatch_lrhold_ep70_min87.pth
  num_epochs: 70
  loss: CE
  label_smoothing: 0.0
  optimizer:
    optim_class: AdamW
    scheduler_class: CosineAnnealingLR
    schedule_policy: hold_then_cosine
    lr_hold_epochs: 18
    lr: 1.0e-05
    eta_min: 1.0e-10
    weight_decay: 0.01
    patience: 20
  update_density:
    optimizer_microbatch_size: 1
  acceptance:
    min_accuracy: 0.8701
    baseline_accuracy: 0.8720
    baseline_run: repro_transfer_993_microbatch_lrhold
    allow_patience_override: true
    note: gated transfer LR-hold run before the windowed real-only experiment; continue only if accuracy exceeds 87 percent
misc_dir:
  ckpt_root: outputs/rebuild_reproduction/checkpoints
  output_root: outputs/rebuild_reproduction/repro_transfer_993_microbatch_lrhold_ep70_min87
  video_subdir: videos
  para_subdir: parameters
  norm_subdir: parametersNorm
