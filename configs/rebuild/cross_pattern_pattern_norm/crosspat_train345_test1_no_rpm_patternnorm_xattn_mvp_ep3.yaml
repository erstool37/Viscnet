project: allnewviscnet
entity: jongwonsohn-seoul-national-university
name: crosspat_train345_test1_no_rpm_patternnorm_xattn_mvp_ep3
version: v0
experiment:
  model_variant: pattern_norm_transformer
train_settings:
  num_workers: 0
  seed: 1205
  classification: true
  gmm_bool: false
  watch_bool: false
  train_bool: true
  test_bool: true
  attn_bool: false
  val_test_bool: true
  sanity_check_bool: false
dataset:
  train:
    train_root: dataset/RealArchive/real_20rpm_increment_train345
    use_all_samples: true
    frame_num: 10
    time: 5
    rpm_class: 10
    dataloader:
      dataloader: VideoDatasetReal
      batch_size: 4
      aug_bool: true
      augmentation:
        type: augv2_noise
        probability: 0.9
        strength: 1.25
      test_size: 1.0e-06
      random_state: 37
  test:
    test_root: dataset/RealArchive/real_20rpm_increment_test1
    frame_num: 10
    time: 5
    rpm_class: 10
    dataloader:
      dataloader: VideoDatasetReal
      batch_size: 4
      aug_bool: false
      test_size: 1.0e-06
      random_state: 37
  preprocess:
    scaler: interscaler
    descaler: interdescaler
model:
  transformer_bool: true
  transformer:
    encoder: VivitPatternNormTransformer
    class: 10
    num_frames: 50
    image_size: 224
  embeddings:
    rpm_bool: false
    pat_bool: true
    pat_mode: pattern_norm_transformer
  pattern_norm:
    enabled: true
    type: cross_attention
    pattern_patch_size: 16
    hidden_size: 256
    num_hidden_layers: 6
    num_attention_heads: 8
    intermediate_size: 1024
    pattern_encoder_layers: 1
    video_encoder_layers: 1
    num_cross_attention_heads: 8
    cross_attention_layers: 1
    use_difference_fusion: true
    use_product_fusion: true
    add_rpm_before_cross_attention: false
    add_rpm_after_cross_attention: false
    store_cross_attention: false
  cnn:
    encoder: Resnet34LSTMEMBED
    cnn_train: true
    cnn: resnet34
    lstm_size: 256
    lstm_layers: 5
    output_size: 3
    drop_rate: 0.0
    embedding_size: 512
    embed_weight: 0.0
  gmm:
    gmm_num: 3
training:
  curr_bool: false
  curr_ckpt: crosspat_train345_test1_no_rpm_patternnorm_xattn_mvp_ep3.pth
  checkpoint_name: crosspat_train345_test1_no_rpm_patternnorm_xattn_mvp_ep3.pth
  num_epochs: 3
  real_test_monitor:
    enabled: true
    dataset: test
    interval_epochs: 1
    log_confusion_matrix: true
  checkpoint_selection:
    metric: val_loss
  loss: CE
  label_smoothing: 0.05
  optimizer:
    optim_class: AdamW
    scheduler_class: CosineAnnealingLR
    schedule_policy: warmup_hold_cosine
    warmup_epochs: 1
    warmup_start_factor: 0.25
    lr_hold_epochs: 1
    lr: 2.0e-05
    eta_min: 3.0e-07
    weight_decay: 0.01
    patience: 3
  acceptance:
    split: train345_test1
    train_root: dataset/RealArchive/real_20rpm_increment_train345
    test_root: dataset/RealArchive/real_20rpm_increment_test1
    note: Smoke-trainable no-RPM Pattern-Normalized Transformer MVP. Clean pattern
      is patch-tokenized and cross-attended by video tubelet tokens. Checkpoint
      selection uses val_loss only.
misc_dir:
  ckpt_root: outputs/rebuild_reproduction/checkpoints
  output_root: outputs/rebuild_reproduction/crosspat_train345_test1_no_rpm_patternnorm_xattn_mvp_ep3
  video_subdir: videos
  para_subdir: parameters
  norm_subdir: parametersNorm
